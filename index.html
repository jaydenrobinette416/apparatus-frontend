<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <style>
        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: Arial,sans-serif;
            background: #07111f;
            color: #e5e7eb
        }

        .header {
            position: relative;
            padding: 18px 12px;
            text-align: center;
            border-bottom: 1px solid #1f3b57;
            background: #0b1626
        }

            .header h1 {
                margin: 0;
                font-size: 22px;
                color: #f8fafc
            }

        #headerAdmin {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%)
        }

        .header-admin-btn {
            width: auto;
            min-height: 36px;
            padding: 8px 12px;
            margin: 0;
            border-radius: 8px;
            font-size: 14px;
            background: #0ea5e9;
            color: white
        }

        .box, .panel {
            width: calc(100% - 24px);
            max-width: 1200px;
            margin: 18px auto;
            background: #0f1b2d;
            border: 1px solid #24364d;
            border-radius: 14px;
            padding: 16px
        }

        .loginbox {
            max-width: 420px
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            color: #cbd5e1;
            font-weight: 600;
            font-size: 14px
        }

        input, select {
            width: 100%;
            min-height: 46px;
            padding: 12px;
            border-radius: 9px;
            border: 1px solid #334155;
            background: #08111f;
            color: #f8fafc;
            font-size: 16px
        }

        button {
            margin-top: 16px;
            width: 100%;
            min-height: 48px;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer
        }

        .logout-btn, .back-btn {
            background: #334155
        }

        .danger-btn {
            background: #dc2626
        }

        .success-btn {
            background: #16a34a
        }

        .admin-btn {
            background: #0ea5e9;
            color: white
        }

        .small-btn {
            width: auto;
            min-height: 38px;
            padding: 8px 12px;
            margin: 5px;
            font-size: 14px
        }

        .link {
            margin-top: 14px;
            text-align: center;
            color: #60a5fa;
            cursor: pointer;
            font-size: 15px
        }

        .msg {
            text-align: center;
            margin-top: 14px;
            font-weight: 600
        }

        .hidden {
            display: none
        }

        .welcome {
            text-align: center;
            color: #e5e7eb;
            font-size: 17px;
            margin-bottom: 18px
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(170px,1fr));
            gap: 12px
        }

        .check-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
            gap: 14px;
            margin-top: 10px;
            align-items: start
        }

        .check-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 18px
        }

        .unit-card, .admin-card {
            background: #101d30;
            border: 1px solid #2c415c;
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            cursor: pointer
        }

            .unit-card:hover, .admin-card:hover {
                background: #15243a;
                border-color: #3b82f6
            }

        .unit-name {
            font-size: 19px;
            font-weight: 700;
            color: #f8fafc
        }

        .unit-title {
            text-align: center;
            color: #f8fafc;
            font-size: 23px;
            font-weight: 700;
            margin-bottom: 16px
        }

        .section-title {
            margin-top: 18px;
            padding: 10px 12px;
            background: #13233a;
            border-left: 4px solid #3b82f6;
            border-radius: 8px;
            font-weight: 700;
            color: #f8fafc
        }

        .check-item, .admin-row {
            margin-top: 10px;
            padding: 14px;
            background: #0b1626;
            border: 1px solid #25364d;
            border-radius: 10px
        }

        .check-grid .check-item {
            margin-top: 0
        }

        .check-item {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px
        }

            .field-row.single {
                grid-template-columns: 1fr
            }

        .check-item label {
            margin-top: 6px
        }

        .check-item select, .check-item input {
            min-height: 42px;
            padding: 10px;
            font-size: 15px
        }

        .item-name {
            font-weight: 700;
            margin-bottom: 8px;
            color: #f8fafc
        }

        .muted {
            color: #94a3b8;
            font-size: 14px
        }

        .pill {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            background: #1e293b;
            color: #e5e7eb;
            font-size: 13px;
            margin-top: 6px
        }

        .shelf-title {
            grid-column: 1/-1;
            margin-top: 14px;
            margin-bottom: 8px;
            padding: 12px 14px;
            background: #13233a;
            border-left: 4px solid #3b82f6;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            color: #f8fafc;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .section-page {
            display: none
        }

            .section-page.active {
                display: block
            }

        .page-progress {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin: 4px 0 14px
        }

        .page-nav {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 18px
        }

        .review-box {
            background: #0b1626;
            border: 1px solid #25364d;
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            margin-top: 14px
        }

        .review-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
            gap: 12px;
            margin-top: 14px
        }

        .review-item {
            text-align: left;
            background: #0b1626;
            border: 1px solid #25364d;
            border-radius: 12px;
            padding: 14px
        }

            .review-item strong {
                color: #f8fafc
            }

        .review-line {
            margin-top: 7px;
            color: #cbd5e1
        }

        .review-label {
            color: #94a3b8;
            font-weight: 700
        }

        @media (max-width:600px) {
            .header {
                padding: 16px 70px
            }

                .header h1 {
                    font-size: 18px
                }

            #headerAdmin {
                left: 8px
            }

            .header-admin-btn {
                font-size: 12px;
                padding: 7px 10px
            }

            .box, .panel {
                width: 100%;
                margin: 0;
                border-radius: 0;
                border-left: none;
                border-right: none;
                min-height: 100vh
            }

            .grid {
                grid-template-columns: 1fr
            }

            .check-grid {
                grid-template-columns: 1fr
            }

            .check-actions {
                grid-template-columns: 1fr
            }

            .page-nav {
                grid-template-columns: 1fr
            }

            .field-row {
                grid-template-columns: 1fr
            }

            .unit-card {
                padding: 22px
            }

            .unit-name {
                font-size: 21px
            }

            .unit-title {
                font-size: 24px
            }
        }

        .toast {
            position: fixed;
            top: 80px;
            right: 20px;
            background: #0f1b2d;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 14px 18px;
            color: #f8fafc;
            font-weight: 700;
            z-index: 999999;
            max-width: 350px;
            box-shadow: 0 10px 35px rgba(0,0,0,.4);
        }

            .toast.success {
                border-left: 5px solid #22c55e;
            }

            .toast.error {
                border-left: 5px solid #ef4444;
            }

            .toast.info {
                border-left: 5px solid #3b82f6;
            }

    .message-board{
  background:#0b1626;
  border:1px solid #334155;
  border-radius:12px;
  padding:15px;
  margin-bottom:20px;
}

.message-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:10px;
}

.message-item{
  padding:10px;
  border-radius:8px;
  margin-bottom:8px;
}

.message-info{
  background:#1e3a5f;
}

.message-important{
  background:#854d0e;
}

.message-urgent{
  background:#7f1d1d;
}


.report-summary-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  margin-top:12px;
}
.report-stat{
  background:#0b1626;
  border:1px solid #25364d;
  border-radius:12px;
  padding:14px;
  text-align:center;
}
.report-stat strong{
  display:block;
  font-size:24px;
  color:#f8fafc;
}
.report-print-area{
  margin-top:14px;
}
.report-unit{
  background:#0b1626;
  border:1px solid #25364d;
  border-radius:12px;
  padding:14px;
  margin-top:12px;
}
.report-issue{
  color:#fca5a5;
  font-weight:700;
}
    

/* ===== BIG PHONE / TABLET TOUCH MODE =====
   Apps Script on iPhone sometimes renders wider than a normal mobile viewport.
   This forces the checkoff screen to feel like a real mobile app even when the
   browser reports 800px+ width. */
@media screen and (max-width: 1100px), (pointer: coarse) {
  html, body {
    width: 100% !important;
    max-width: 100% !important;
    overflow-x: hidden !important;
    font-size: 20px !important;
    -webkit-text-size-adjust: 125% !important;
  }

  body {
    line-height: 1.35 !important;
  }

  .box,
  .panel {
    width: 100% !important;
    max-width: 100% !important;
    margin: 0 !important;
    padding: 18px !important;
    border-left: none !important;
    border-right: none !important;
    border-radius: 0 !important;
    min-height: 100vh !important;
  }

  .header {
    padding: 14px 14px !important;
  }

  .header h1 {
    font-size: 24px !important;
    line-height: 1.25 !important;
  }

  #headerAdmin {
    position: static !important;
    transform: none !important;
    margin-bottom: 10px !important;
  }

  .header-admin-btn {
    width: 100% !important;
    min-height: 62px !important;
    font-size: 20px !important;
    border-radius: 14px !important;
  }

  .welcome {
    font-size: 20px !important;
    margin-bottom: 18px !important;
  }

  .grid,
  .check-grid,
  .review-summary,
  .report-summary-grid,
  .field-row,
  .field-row.single,
  .check-actions,
  .page-nav {
    display: grid !important;
    grid-template-columns: 1fr !important;
    gap: 16px !important;
    width: 100% !important;
    max-width: 100% !important;
  }

  .grid > *,
  .check-grid > *,
  .review-summary > *,
  .report-summary-grid > * {
    grid-column: 1 / -1 !important;
    width: 100% !important;
    max-width: 100% !important;
  }

  .unit-card,
  .admin-card {
    width: 100% !important;
    min-height: 105px !important;
    padding: 28px 18px !important;
    border-radius: 18px !important;
  }

  .unit-name {
    font-size: 28px !important;
    line-height: 1.25 !important;
  }

  .unit-title {
    font-size: 30px !important;
    line-height: 1.25 !important;
    margin-bottom: 20px !important;
  }

  .section-title,
  .shelf-title {
    font-size: 22px !important;
    line-height: 1.25 !important;
    padding: 16px !important;
    border-radius: 14px !important;
    margin-top: 18px !important;
    margin-bottom: 14px !important;
  }

  .page-progress {
    font-size: 18px !important;
    margin: 8px 0 16px !important;
  }

  .check-item,
  .admin-row,
  .review-item,
  .review-box,
  .report-unit,
  .report-stat,
  .message-board,
  .message-item {
    width: 100% !important;
    max-width: 100% !important;
    padding: 20px !important;
    border-radius: 18px !important;
  }

  .check-item {
    gap: 14px !important;
    margin-bottom: 16px !important;
  }

  .item-name {
    font-size: 24px !important;
    line-height: 1.3 !important;
    margin-bottom: 8px !important;
  }

  .muted,
  .review-line,
  .pill,
  .message-item,
  .msg,
  .link {
    font-size: 18px !important;
    line-height: 1.4 !important;
  }

  label,
  .check-item label {
    font-size: 18px !important;
    line-height: 1.25 !important;
    margin-top: 10px !important;
    margin-bottom: 8px !important;
  }

  input,
  select,
  button,
  textarea {
    min-height: 68px !important;
    font-size: 22px !important;
    line-height: 1.25 !important;
    padding: 16px !important;
    border-radius: 16px !important;
  }

  input,
  select {
    background: #07111f !important;
  }

  button {
    min-height: 70px !important;
    font-size: 22px !important;
    margin-top: 18px !important;
  }

  .small-btn {
    width: 100% !important;
    min-height: 64px !important;
    margin: 8px 0 !important;
  }

  .message-title {
    font-size: 24px !important;
  }

  .toast {
    left: 12px !important;
    right: 12px !important;
    top: 70px !important;
    max-width: none !important;
    font-size: 18px !important;
  }

  .page-nav {
    position: sticky !important;
    bottom: 0 !important;
    z-index: 9999 !important;
    background: rgba(15, 27, 45, .98) !important;
    border-top: 1px solid #24364d !important;
    padding: 12px 12px calc(12px + env(safe-area-inset-bottom)) !important;
    margin: 22px -18px -18px !important;
  }

  .page-nav button {
    width: 100% !important;
    margin: 0 !important;
  }

  #saveCheckBtn {

  }

    </style>
</head>

<body>

    <div class="header">
        <div id="headerAdmin"></div>
        <h1>Daily Apparatus Check System</h1>
    </div>

    <div id="loginView" class="box loginbox">
        <h2>Login</h2>
        <label>Username</label>
        <input id="loginUsername">
        <label>Password</label>
        <input id="loginPassword" type="password">
        <button onclick="login()">Login</button>
        <div class="link" onclick="showSignup()">Create Account</div>
        <div id="loginMsg" class="msg"></div>
    </div>

    <div id="signupView" class="box loginbox hidden">
        <h2>Create Account</h2>
        <label>Name</label>
        <input id="signupName">
        <label>Username</label>
        <input id="signupUsername">
        <label>Password</label>
        <input id="signupPassword" type="password">
        <label>Base</label>
        <select id="signupBase">
            <option value="93">Base 93</option>
            <option value="98">Base 98</option>
        </select>
        <button onclick="signup()">Create Account</button>
        <div class="link" onclick="showLogin()">Back to Login</div>
        <div id="signupMsg" class="msg"></div>
    </div>

    <div id="dashboardView" class="panel hidden">
        <div class="welcome" id="welcomeText"></div>
        <div id="messageBoard"></div>
        <div class="grid" id="apparatusGrid"></div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div id="checkView" class="panel hidden">
        <div id="checkForm"></div>
    </div>

    <div id="adminView" class="panel hidden">
        <div id="adminContent"></div>
    </div>

    <script>
let currentUser = null;
const API_BASE = "https://apparatus-api.vercel.app/api";

function showToast(message,type="info"){

  const old = document.getElementById("pageToast");
  if(old) old.remove();

  const toast = document.createElement("div");

  toast.id = "pageToast";
  toast.className = "toast " + type;
  toast.innerHTML = message;

  document.body.appendChild(toast);

  setTimeout(() => {
    const t = document.getElementById("pageToast");
    if(t) t.remove();
  }, 3500);
}


function formatExpDate(input){

  let value = input.value.replace(/\D/g,'');

  if(value.length > 2){
    value =
      value.substring(0,2) +
      "/" +
      value.substring(2,4);
  }

  input.value = value;
}

window.onload = function(){
  const savedUser = sessionStorage.getItem("currentUser");
  if(savedUser){
    currentUser = JSON.parse(savedUser);
    showDashboard();
  }
};

function hideAll(){
  document.getElementById("loginView").classList.add("hidden");
  document.getElementById("signupView").classList.add("hidden");
  document.getElementById("dashboardView").classList.add("hidden");
  document.getElementById("checkView").classList.add("hidden");
  document.getElementById("adminView").classList.add("hidden");
}

function showSignup(){
  hideAll();
  document.getElementById("signupView").classList.remove("hidden");
}

function showLogin(){
  hideAll();
  document.getElementById("headerAdmin").innerHTML = "";
  document.getElementById("loginView").classList.remove("hidden");
}

const API_BASE = "https://apparatus-api.vercel.app/api";

function signup(){
  const user = {
    name: document.getElementById("signupName").value.trim(),
    username: document.getElementById("signupUsername").value.trim(),
    password: document.getElementById("signupPassword").value.trim(),
    base: document.getElementById("signupBase").value
  };

  const msg = document.getElementById("signupMsg");

  if(!user.name || !user.username || !user.password){
    msg.style.color = "#f87171";
    msg.textContent = "Fill out all fields.";
    return;
  }

  msg.style.color = "#60a5fa";
  msg.textContent = "Creating account...";

  fetch(API_BASE + "/users", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      action: "signup",
      ...user
    })
  })
  .then(res => res.json())
  .then(result => {
    msg.style.color = result.success ? "#4ade80" : "#f87171";
    msg.textContent = result.message;
  })
  .catch(error => {
    msg.style.color = "#f87171";
    msg.textContent = error.message;
  });
}

function login(){
  const username = document.getElementById("loginUsername").value.trim();
  const password = document.getElementById("loginPassword").value.trim();
  const msg = document.getElementById("loginMsg");

  if(!username || !password){
    msg.style.color = "#f87171";
    msg.textContent = "Enter username and password.";
    return;
  }

  msg.style.color = "#60a5fa";
  msg.textContent = "Logging in...";

  fetch(API_BASE + "/users", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      action: "login",
      username,
      password
    })
  })
  .then(res => res.json())
  .then(result => {
    if(!result.success){
      msg.style.color = "#f87171";
      msg.textContent = result.message;
      return;
    }

    currentUser = result;
    sessionStorage.setItem("currentUser", JSON.stringify(currentUser));
    showDashboard();
  })
  .catch(error => {
    msg.style.color = "#f87171";
    msg.textContent = error.message;
  });
}

function showDashboard(){
  hideAll();
  document.getElementById("dashboardView").classList.remove("hidden");

  document.getElementById("welcomeText").textContent =
    "Welcome, " + currentUser.name + " | Base " + currentUser.base;

  document.getElementById("headerAdmin").innerHTML = "";

  if(currentUser.role === "ADMIN"){
    document.getElementById("headerAdmin").innerHTML =
      `<button class="header-admin-btn" onclick="openAdmin()">Admin</button>`;
  }

  google.script.run
  .withSuccessHandler(showApparatus)
  .getApparatusForBase(currentUser.base);

loadMessageBoardFromMongo();
}


function loadMessageBoardFromMongo(){
  fetch(`${API_BASE}/messages?activeOnly=true`)
    .then(res => res.json())
    .then(data => {
      if(!data.ok){
        throw new Error(data.error || "Unable to load messages.");
      }
      loadMessageBoard(data.messages || []);
    })
    .catch(error => {
      const board = document.getElementById("messageBoard");
      if(board){
        board.innerHTML = `
          <div class="message-board">
            <div class="message-title">Crew Message Board</div>
            <div class="message-item message-urgent">
              Message board error: ${escapeHtml(error.message)}
            </div>
          </div>
        `;
      }
    });
}

function showApparatus(units){
  const grid = document.getElementById("apparatusGrid");
  grid.innerHTML = "";

  units.forEach(unit => {
    const card = document.createElement("div");
    card.className = "unit-card";
    card.innerHTML = `<div class="unit-name">${unit}</div>`;
    card.onclick = () => openCheckForm(unit);
    grid.appendChild(card);
  });
}

function openCheckForm(unit){
  hideAll();
  document.getElementById("checkView").classList.remove("hidden");

  document.getElementById("checkForm").innerHTML =
    `<p style="text-align:center;color:#60a5fa;">Loading checklist...</p>`;

  google.script.run
    .withSuccessHandler(items => buildCheckForm(unit, items))
    .withFailureHandler(error => alert(error.message))
    .getChecklistForUnit(unit);
}

function displaySectionName(section){
  return section || "General";
}

function buildCheckForm(unit, items){
  let pages = [];
  let pageMap = {};

  items.forEach(item => {
    const originalSection = item.section || "";
    const displaySection = displaySectionName(originalSection);

    if(!pageMap[displaySection]){
      pageMap[displaySection] = [];
      pages.push({ name: displaySection, items: pageMap[displaySection] });
    }

    pageMap[displaySection].push(item);
  });

  let html = `<div class="unit-title">${unit}</div>`;

  if(pages.length === 0){
    html += `
      <div class="review-box">
        <strong>No checklist items found for this apparatus.</strong>
      </div>
      <button class="back-btn" onclick="showDashboard()">Back</button>
    `;
    document.getElementById("checkForm").innerHTML = html;
    return;
  }

  pages.forEach((page, pageIndex) => {
    html += `
      <div class="section-page ${pageIndex === 0 ? "active" : ""}" data-page="${pageIndex}">
        <div class="page-progress">Section ${pageIndex + 1} of ${pages.length + 1}</div>
        <div class="section-title">${page.name}</div>
    `;

    let currentShelf = "";
    let gridOpen = false;

    function closeGrid(){
      if(gridOpen){

function getCurrentSectionPageIndex(){
  const pages = Array.from(document.querySelectorAll(".section-page"));
  return pages.findIndex(page => page.classList.contains("active"));
}

function showSectionPage(index){
  const pages = Array.from(document.querySelectorAll(".section-page"));
  if(index < 0 || index >= pages.length) return;

  pages.forEach(page => page.classList.remove("active"));
  pages[index].classList.add("active");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function nextSectionPage(){
  const current = getCurrentSectionPageIndex();
  showSectionPage(current + 1);

  const pages = Array.from(document.querySelectorAll(".section-page"));
  const newIndex = getCurrentSectionPageIndex();

  if(newIndex === pages.length - 1){
    buildReviewSummary();
  }
}

function prevSectionPage(){
  const current = getCurrentSectionPageIndex();
  showSectionPage(current - 1);
}


function escapeHtml(value){
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getItemReviewAnswer(card){
  const type = card.dataset.type;
  const lines = [];

  if(type === "ONTRUCK"){
    const onApp = card.querySelector(".onApparatus")?.value || "";
    lines.push(`
      <div class="review-line">
        <strong>On Truck:</strong> ${escapeHtml(onApp)}
      </div>
    `);
  }
  else if(type === "FUNCTIONAL"){
    const functional = card.querySelector(".functional")?.value || "";
    lines.push(`
      <div class="review-line">
        <strong>Functional:</strong> ${escapeHtml(functional)}
      </div>
    `);
  }
  else if(type === "PASSFAIL"){
    const onApp = card.querySelector(".onApparatus")?.value || "";
    const functional = card.querySelector(".functional")?.value || "";

    lines.push(`
      <div class="review-line">
        <strong>On Truck:</strong> ${escapeHtml(onApp)}
      </div>
    `);

    lines.push(`
      <div class="review-line">
        <strong>Functional:</strong> ${escapeHtml(functional)}
      </div>
    `);
  }
  else if(type === "FUEL"){
    const fuel = card.querySelector(".mainValue")?.value || "";
    lines.push(`
      <div class="review-line">
        <strong>Fuel:</strong> ${escapeHtml(fuel)}
      </div>
    `);
  }
  else if(type === "DATE"){
    const exp = card.querySelector(".mainValue")?.value || "";
    lines.push(`
      <div class="review-line">
        <strong>Exp:</strong> ${escapeHtml(exp)}
      </div>
    `);
  }
  else if(type === "NUMBER"){
    const value = card.querySelector(".mainValue")?.value || "";
    lines.push(`
      <div class="review-line">
        <strong>Number:</strong> ${escapeHtml(value)}
      </div>
    `);
  }
  else {
    const text = card.querySelector(".mainValue")?.value || "";
    lines.push(`
      <div class="review-line">
        <strong>Text:</strong> ${escapeHtml(text)}
      </div>
    `);
  }

  const notes = card.querySelector(".notes")?.value || "";
  lines.push(`
    <div class="review-line">
      <strong>Notes:</strong> ${escapeHtml(notes)}
    </div>
  `);

  return lines.join("");
}

function buildReviewSummary(){
  const reviewBox = document.getElementById("reviewSummary");
  if(!reviewBox) return;

  const cards = Array.from(document.querySelectorAll(".check-item"));

  if(cards.length === 0){
    reviewBox.innerHTML = `<div class="admin-row">No checklist items found.</div>`;
    return;
  }

  let html = "";
  let currentSection = "";
  let currentShelf = "";
  let gridOpen = false;

  function closeGrid(){
    if(gridOpen){
      html += `</div>`;
      gridOpen = false;
    }
  }

  function openGrid(){
    if(!gridOpen){
      html += `<div class="review-summary">`;
      gridOpen = true;
    }
  }

  cards.forEach(card => {
    const section = card.dataset.section || "General";
    const subsection = card.dataset.subsection || "";
    const shelf = card.dataset.shelf || "";
    const item = card.dataset.item || "Item";

    if(section !== currentSection){
      closeGrid();
      currentSection = section;
      currentShelf = "";
      html += `<div class="section-title">${escapeHtml(currentSection)}</div>`;
      openGrid();
    }

    if(shelf && shelf !== currentShelf){
      closeGrid();
      currentShelf = shelf;
      html += `<div class="shelf-title">${escapeHtml(currentShelf)}</div>`;
      openGrid();
    }

    openGrid();

    html += `
      <div class="review-item">
        <div class="item-name">${escapeHtml(item)}</div>
        ${getItemReviewAnswer(card)}
      </div>
    `;
  });

  closeGrid();

  reviewBox.innerHTML = html;
}

function submitCheck(unit){
  const submitButton = document.getElementById("saveCheckBtn") || document.querySelector(".check-actions button");

  if(submitButton){
    submitButton.disabled = true;
    submitButton.innerHTML = "Please Wait...";
    submitButton.style.opacity = ".6";
  }

  showSavingOverlay();

  const cards = document.querySelectorAll(".check-item");
  const items = [];
  let hasIssue = false;
  let missing = [];

  cards.forEach(card => {
    const section = card.dataset.section || "";
    const subsection = card.dataset.subsection || "";
    const shelf = card.dataset.shelf || "";
    const item = card.dataset.item;
    const type = card.dataset.type;

    let value = "";
    let status = "OK";

    if(type === "ONTRUCK"){
      const onApp = card.querySelector(".onApparatus").value;
      if(!onApp) missing.push(item);
      value = "On Apparatus: " + onApp;

      if(onApp === "No"){
        status = "ISSUE";
        hasIssue = true;
      } else {
        status = "PASS";
      }
    } else if(type === "FUNCTIONAL"){
      const functional = card.querySelector(".functional").value;
      if(!functional) missing.push(item);
      value = "Functional: " + functional;

      if(functional === "No"){
        status = "ISSUE";
        hasIssue = true;
      } else {
        status = "PASS";
      }
    } else if(type === "PASSFAIL"){
      const onApp = card.querySelector(".onApparatus").value;
      const functional = card.querySelector(".functional").value;
      if(!onApp || !functional) missing.push(item);

      value = "On Apparatus: " + onApp + " | Functional: " + functional;

      if(onApp === "No" || functional === "No"){
        status = "ISSUE";
        hasIssue = true;
      } else {
        status = "PASS";
      }
    } else {
      const input = card.querySelector(".mainValue");
      value = input ? input.value : "";
      status = "OK";
    }

    const notesField = card.querySelector(".notes");
    const notes = notesField ? notesField.value : "";

    items.push({section,subsection,shelf,item,type,value,status,notes});
  });

  if(missing.length > 0){
    hideSavingOverlay();

    if(submitButton){
      submitButton.disabled = false;
      submitButton.innerHTML = "Save Check";
      submitButton.style.opacity = "1";
    }

    alert("Please complete these required fields:\n\n" + missing.join("\n"));
    return;
  }

  document.querySelectorAll(".exp-date").forEach(input => {

  if(
    input.value &&
    !/^\d{2}\/\d{2}$/.test(input.value)
  ){
    throw new Error(
      "Expiration dates must be MM/YY"
    );
  }

});

  const checkData = {
    unit: unit,
    checkedBy: currentUser.name,
    status: hasIssue ? "ISSUES" : "COMPLETE",
    items: items
  };

  google.script.run
    .withSuccessHandler(result => {
      hideSavingOverlay();
      showToast("Check submitted successfully.","success");
      showDashboard();
    })
    .withFailureHandler(error => {
      hideSavingOverlay();

      if(submitButton){
        submitButton.disabled = false;
        submitButton.innerHTML = "Save Check";
        submitButton.style.opacity = "1";
      }

      alert(error.message);
    })
    .saveCheck(checkData);
}

function toggleShelfField(){
  const section = document.getElementById("builderSection").value.toLowerCase();
  const subsectionField = document.getElementById("subsectionField");
  const builderSubsection = document.getElementById("builderSubsection");
  const shelfChoice = document.getElementById("shelfChoice");
  const shelfField = document.getElementById("shelfField");
  const hasShelf = document.getElementById("hasShelf");
  const shelfInput = document.getElementById("builderShelf");

  if(section.includes("medical bag")){
    subsectionField.classList.remove("hidden");
    shelfChoice.classList.add("hidden");
    shelfField.classList.add("hidden");

    if(hasShelf) hasShelf.checked = false;
    if(shelfInput) shelfInput.value = "";

    return;
  }

  subsectionField.classList.add("hidden");
  if(builderSubsection) builderSubsection.value = "";

  if(section.includes("compartment")){
    shelfChoice.classList.remove("hidden");
  } else {
    shelfChoice.classList.add("hidden");
    shelfField.classList.add("hidden");
    if(hasShelf) hasShelf.checked = false;
    if(shelfInput) shelfInput.value = "";
  }
}

function getValuePart(value, label){
  const text = String(value || "");
  const parts = text.split("|").map(p => p.trim());
  const match = parts.find(p => p.toLowerCase().startsWith(label.toLowerCase() + ":"));
  if(!match) return "";
  return match.substring(match.indexOf(":") + 1).trim();
}

function formatDetailAnswer(d){
  const type = String(d.type || "").toUpperCase();
  const value = String(d.value || "");
  let lines = [];

  if(type === "ONTRUCK"){
    lines.push(`<div class="review-line"><strong>On Truck:</strong> ${escapeHtml(getValuePart(value, "On Apparatus") || value)}</div>`);
  }
  else if(type === "FUNCTIONAL"){
    lines.push(`<div class="review-line"><strong>Functional:</strong> ${escapeHtml(getValuePart(value, "Functional") || value)}</div>`);
  }
  else if(type === "PASSFAIL"){
    lines.push(`<div class="review-line"><strong>On Truck:</strong> ${escapeHtml(getValuePart(value, "On Apparatus"))}</div>`);
    lines.push(`<div class="review-line"><strong>Functional:</strong> ${escapeHtml(getValuePart(value, "Functional"))}</div>`);
  }
  else if(type === "FUEL"){
    lines.push(`<div class="review-line"><strong>Fuel:</strong> ${escapeHtml(value)}</div>`);
  }
  else if(type === "DATE"){
    lines.push(`<div class="review-line"><strong>Exp:</strong> ${escapeHtml(value)}</div>`);
  }
  else if(type === "NUMBER"){
    lines.push(`<div class="review-line"><strong>Number:</strong> ${escapeHtml(value)}</div>`);
  }
  else {
    lines.push(`<div class="review-line"><strong>Text:</strong> ${escapeHtml(value)}</div>`);
  }

  lines.push(`<div class="review-line"><strong>Notes:</strong> ${escapeHtml(d.notes || "")}</div>`);
  return lines.join("");
}

function loadServiceSchedule(){
  document.getElementById("adminResults").innerHTML =
    `<p style="text-align:center;color:#60a5fa;">Loading service schedule...</p>`;

  google.script.run
    .withSuccessHandler(services => {
      services = services || [];

      let html = `
        <div class="section-title">Service Schedule</div>

        <div class="admin-row">
          <div class="item-name">Add Service Item</div>

          <label>Unit</label>
          <input id="serviceUnit" placeholder="Example: Medic 1">

          <label>Service Item</label>
          <input id="serviceItem" placeholder="Example: Oil Change">

          <label>Current Value</label>
          <input id="serviceCurrent" placeholder="Example: 125000">

          <label>Due At</label>
          <input id="serviceDue" placeholder="Example: 126000 or 12/31/2026">

          <label>Type</label>
          <select id="serviceType">
            <option value="MILES">MILES</option>
            <option value="HOURS">HOURS</option>
            <option value="DATE">DATE</option>
          </select>

          <button onclick="addServiceScheduleItem()">
            Add Service Item
          </button>
        </div>
      `;

      if(services.length === 0){
        html += `
          <div class="admin-row">
            No service items found.
          </div>
        `;
      }

      services.forEach(s => {
        const type = String(s.type || "").toUpperCase();
        const current = Number(s.currentValue || 0);
        const due = Number(s.dueAt || 0);
        let statusColor = "#4ade80";
        let statusText = "GOOD";

        if(type === "MILES" || type === "HOURS"){
          const remaining = due - current;
          const warningPoint = type === "MILES" ? 500 : 50;

          if(remaining <= 0){
            statusColor = "#ef4444";
            statusText = Math.abs(remaining) + " " + type + " OVERDUE";
          } else if(remaining <= warningPoint){
            statusColor = "#facc15";
            statusText = remaining + " " + type + " LEFT";
          } else {
            statusText = remaining + " " + type + " LEFT";
          }
        } else if(type === "DATE"){
          const dueDate = new Date(s.dueAt);
          const today = new Date();
          today.setHours(0,0,0,0);

          if(!isNaN(dueDate.getTime())){
            dueDate.setHours(0,0,0,0);
            const daysLeft = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));

            if(daysLeft < 0){
              statusColor = "#ef4444";
              statusText = Math.abs(daysLeft) + " DAYS OVERDUE";
            } else if(daysLeft <= 30){
              statusColor = "#facc15";
              statusText = daysLeft + " DAYS LEFT";
            } else {
              statusText = daysLeft + " DAYS LEFT";
            }
          }
        }

        html += `
          <div class="admin-row">
            <strong>${escapeHtml(s.unit)}</strong><br>
            <span class="item-name">${escapeHtml(s.serviceItem)}</span><br>

            <span class="pill">${escapeHtml(type)}</span>
            <span class="pill">Active: ${escapeHtml(s.active)}</span>

            <br><br>

            <span style="color:${statusColor};font-weight:700;">
              ${escapeHtml(statusText)}
            </span>

            <label>Current Value</label>
            <input id="current_${s.row}" value="${escapeHtml(s.currentValue)}">

            <label>Due At</label>
            <input id="due_${s.row}" value="${escapeHtml(s.dueAt)}">

            <label>Active</label>
            <select id="active_${s.row}">
              <option value="YES" ${String(s.active).toUpperCase()==="YES" ? "selected" : ""}>YES</option>
              <option value="NO" ${String(s.active).toUpperCase()==="NO" ? "selected" : ""}>NO</option>
            </select>

            <button class="success-btn small-btn" onclick="saveServiceItem(${s.row})">
              Save
            </button>

            <button class="danger-btn small-btn" onclick="deleteServiceItemAdmin(${s.row})">
              Delete
            </button>
          </div>
        `;
      });

      document.getElementById("adminResults").innerHTML = html;
    })
    .withFailureHandler(error => alert(error.message))
    .getServiceSchedule();
}

}

  report = report || {};

  let html = `

  const printWindow = window.open("", "_blank");
  printWindow.document.write(`
    <!DOCTYPE html>
    <html>
    <head>
      <title>Daily Apparatus Check Report</title>
      <style>
        body{font-family:Arial,sans-serif;color:#111827;padding:24px;}

        .review-line{margin-top:7px;}
        .report-issue{color:#b91c1c;font-weight:700;}

function logout(){
  sessionStorage.removeItem("currentUser");
  currentUser = null;
  document.getElementById("headerAdmin").innerHTML = "";
  hideAll();
  document.getElementById("loginView").classList.remove("hidden");
}

function loadMessageBoard(messages){

  const board = document.getElementById("messageBoard");
  if(!board) return;

  let html = `
    <div class="message-board">
      <div class="message-title">
        Crew Message Board
      </div>
  `;

  if(!messages || messages.length === 0){
    html += `
      <div class="message-item message-info">
        No active crew messages.
      </div>
    `;
    html += "</div>";
    board.innerHTML = html;
    return;
  }

  messages.forEach(msg => {

    let cls = "message-info";
    const priority = String(msg.priority || "").trim().toUpperCase();

    if(priority === "IMPORTANT") cls = "message-important";
    if(priority === "URGENT") cls = "message-urgent";

    html += `
      <div class="message-item ${cls}">
        ${escapeHtml(msg.message)}
      </div>
    `;
  });

  html += "</div>";

  board.innerHTML = html;
}
